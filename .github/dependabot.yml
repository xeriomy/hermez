version: 2
updates:
  # Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      ktor:
        patterns: ["io.ktor:*"]
      androidx:
        patterns: ["androidx.*"]
      kotlinx:
        patterns: ["org.jetbrains.kotlinx:*"]
      compose:
        patterns: ["androidx.compose.*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
