name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: only `contents: read` is needed for pull/request builds.
# Release publishing uses a separate workflow with elevated permissions.
permissions:
  contents: read
  checks: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.configuration-cache=true"
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION: "21"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint + unit tests — fast feedback, no APK needed.
  # ---------------------------------------------------------------------------
  verify:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          ndk: false
          emulator: false
          cache-key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest testReleaseUnitTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: debug APK build. Depends on verify to fail fast.
  # ---------------------------------------------------------------------------
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          ndk: false
          emulator: false
          cache-key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermex-android-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Job 3: release APK build.
  # ---------------------------------------------------------------------------
  # Builds a release APK. If signing secrets are present (HERMES_KEYSTORE_BASE64,
  # HERMES_KEYSTORE_PASSWORD, HERMES_KEY_ALIAS, HERMES_KEY_PASSWORD), the APK is
  # signed with them; otherwise it falls back to the debug signing config so the
  # artifact is still installable on emulators. Either way, a real compilation
  # failure fails the job — no silent `|| echo` swallowing.
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          ndk: false
          emulator: false
          cache-key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Decode signing keystore (if provided)
        if: ${{ env.HERMES_KEYSTORE_BASE64 != '' }}
        env:
          HERMES_KEYSTORE_BASE64: ${{ secrets.HERMES_KEYSTORE_BASE64 }}
        run: |
          echo "$HERMES_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/hermes.jks"
          echo "HERMES_KEYSTORE_FILE=$RUNNER_TEMP/hermes.jks" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          HERMES_KEYSTORE_FILE: ${{ env.HERMES_KEYSTORE_FILE }}
          HERMES_KEYSTORE_PASSWORD: ${{ secrets.HERMES_KEYSTORE_PASSWORD }}
          HERMES_KEY_ALIAS: ${{ secrets.HERMES_KEY_ALIAS }}
          HERMES_KEY_PASSWORD: ${{ secrets.HERMES_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Locate unsigned/signed APKs
        id: locate
        run: |
          set -euo pipefail
          out="app/build/outputs/apk/release"
          if [[ -f "$out/app-release.apk" ]]; then
            echo "apk_path=$out/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "apk_name=hermex-release-signed.apk" >> "$GITHUB_OUTPUT"
          elif [[ -f "$out/app-release-unsigned.apk" ]]; then
            echo "apk_path=$out/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
            echo "apk_name=hermex-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No release APK produced"
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.locate.outputs.apk_name }}
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
