name: Android CI

on:
  push:
    branches: [ master, main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true"
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION: "21"

jobs:
  # ---------------------------------------------------------------------------
  # Single job: compile + test + debug APK.
  #
  # Previously this was 3 separate jobs (verify → build-debug → build-release)
  # each of which re-downloaded the Android SDK and re-compiled from scratch.
  # Merging into one job saves ~3-4 minutes of duplicate setup.
  #
  # Release APK builds are now in release.yml (tag-triggered only) because
  # R8 minification is slow and we don't need it on every push.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          ndk: false
          emulator: false
          cache-key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Compile both modules first — fast feedback if there's a syntax error.
      - name: Compile
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac

      # Unit tests — only debug variant (release tests just duplicate debug).
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      # Lint — only on PRs (slow, and abortOnError=false means it won't
      # fail the build anyway).
      - name: Lint
        if: github.event_name == 'pull_request'
        run: ./gradlew lintDebug

      # Assemble debug APK.
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hermex-android-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 7
