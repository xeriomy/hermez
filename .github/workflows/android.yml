name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27b
          emulator: false
          build-tools: "34.0.0"
          cache-key: android-sdk-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Print SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME
          ls -la $ANDROID_HOME/platforms
          ls -la $ANDROID_HOME/build-tools
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list | head -50

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build.log
          retention-days: 7

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermex-android-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease --stacktrace --info 2>&1 || echo "Release build failed (expected without signing config)"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hermex-android-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14